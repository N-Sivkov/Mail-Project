<div class="mailbox-toolbar">
  <button (click)="openInterface()">New Letter</button>
</div>

@if (showInterface()) {
  <app-new-letter
    [draft]="composeDraft()"
    (close)="closeInterface()"
    (sent)="onLetterSent()"
  ></app-new-letter>
}

<app-letter-list [filter]="currentFilter()"></app-letter-list>
