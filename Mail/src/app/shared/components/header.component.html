<nav class="navbar">
  @if (isAuthenticated()) {
    <div class="headbar">
      <a routerLink="/mailbox">Inbox</a>
      <button (click)="logout()">Logout</button>
    </div><br>
    <div class="leftbar">
      @for (category of categories(); track category.id) {
        <a [routerLink]="['/mailbox', category.route]" routerLinkActive="active">
          {{ category.name }}
        </a>
      }
    </div>
  } @else {
    <div class="headbar">
      <a routerLink="/login">Login</a>
      <a routerLink="/signup">Signup</a>
    </div>
  }
</nav>
